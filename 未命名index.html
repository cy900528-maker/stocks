<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下單股數計算機</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding-top: 60px; margin: 0; }
        .calculator { background: white; padding: 35px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); width: 100%; max-width: 360px; }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 30px; letter-spacing: 1px; }
        .field { margin-bottom: 22px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #4a4a4a; }
        input { width: 100%; padding: 14px; border: 1.5px solid #e0e0e0; border-radius: 12px; box-sizing: border-box; font-size: 18px; transition: all 0.3s; }
        input:focus { border-color: #007AFF; outline: none; background: #fafafa; }
        button { width: 100%; padding: 16px; background: #007AFF; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.97); background: #0063cc; }
        #result-area { margin-top: 30px; padding: 25px; background: #f8fbff; border: 1px solid #e1efff; border-radius: 16px; text-align: center; display: none; }
        .label { color: #666; font-size: 15px; margin-bottom: 5px; }
        #output { color: #d0021b; font-size: 42px; font-weight: 900; margin: 5px 0; }
        .unit { color: #1a1a1a; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

<div class="calculator">
    <h2>下單股數計算機</h2>
    <div class="field">
        <label>欲下單股價 (元)</label>
        <input type="number" id="price" placeholder="輸入目前股價" step="any" inputmode="decimal">
    </div>
    <div class="field">
        <label>預計下單總金額 (元)</label>
        <input type="number" id="budget" placeholder="輸入總預算金額" inputmode="numeric">
    </div>
    <button id="btn">立即計算</button>
    <div id="result-area">
        <div class="label">預計可下單股數</div>
        <div id="output">0</div>
        <div class="unit">股</div>
        <div style="font-size: 12px; color: #bbb; margin-top: 10px;">(已自動無條件捨去)</div>
    </div>
</div>

<script>
    document.getElementById('btn').addEventListener('click', function() {
        const p = parseFloat(document.getElementById('price').value);
        const b = parseFloat(document.getElementById('budget').value);
        const area = document.getElementById('result-area');
        const out = document.getElementById('output');
        if (p > 0 && b > 0) {
            const count = b / (p * 1.0015);
            out.innerText = Math.floor(count).toLocaleString();
            area.style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } else {
            alert("請輸入正確的股價與總金額喔！");
        }
    });
</script> 

</body>
</html>
